version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aether_postgres
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether_pass
      POSTGRES_DB: aether_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aether_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether_bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aether:aether_pass@postgres:5432/aether_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./soul:/app/soul
      - ./skills:/app/skills
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python main.py --api-only

  chromadb:
    image: chromadb/chroma:latest
    container_name: aether_chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  default:
    name: aether_network
